name: Flush Content Queue

on:
  # 每 10 分钟自动跑
  schedule:
    - cron: '*/10 * * * *'

  # 队列文件 push 时立即跑
  push:
    paths:
      - 'data/pending-pushes.json'
      - 'sites.yaml'

  # 手动 trigger
  workflow_dispatch:
    inputs:
      site:
        description: 'Only flush for specific site id (optional)'
        required: false
      dry_run:
        description: 'Dry run (no actual push)'
        type: boolean
        required: false
        default: false

jobs:
  flush:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write  # 推送队列更新后 commit 回主仓

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run flush-queue
        env:
          # 默认 GITHUB_TOKEN 只能访问当前仓。要 push 到多个子仓，用 PAT
          GITHUB_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.site }}" ]; then
            ARGS="--site ${{ inputs.site }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          node scripts/flush-queue.mjs $ARGS

      - name: Commit updated queue
        if: always()
        run: |
          git config user.name "blog-system-bot"
          git config user.email "bot@blog-system.local"
          git add data/pending-pushes.json data/history/ || true
          if git diff --cached --quiet; then
            echo "No queue changes"
          else
            git commit -m "chore: flush content queue [skip ci]"
            git push
          fi